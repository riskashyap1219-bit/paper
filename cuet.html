<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET Mock Test</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

h2 { text-align: center; }

.timer {
  text-align: right;
  font-size: 18px;
  color: red;
}

.question {
  margin-bottom: 20px;
}

button {
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.result-box {
  margin-top: 20px;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 8px;
}

.correct { color: green; }
.wrong { color: red; }

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 600px) {
  body { padding: 10px; }

  .container { padding: 15px; }

  .question p {
    font-size: 16px;
  }

  input[type="radio"] {
    transform: scale(1.2);
    margin-right: 8px;
  }

  button {
    width: 100%;
    font-size: 16px;
  }
}
</style>
</head>

<body>

<div class="timer">
⏱ Time Left: <span id="time">50:00</span>
</div>

<form id="quizForm"></form>

<button onclick="submitTest()">Submit</button>

// OPTIONS (same order)
const optionText = [

["हथियार बढ़ाना","कम/समाप्त","युद्ध","सेना"]
];

// RENDER
let form=document.getElementById("quizForm");
questions.forEach((q,i)=>{
let html=`<div class="question"><p>${i+1}. ${q[0]}</p>`;
optionText[i].forEach((opt,j)=>{
html+=`<input type="radio" name="q${i}" value="${["a","b","c","d"][j]}"> ${opt}<br>`;
});
html+=`</div>`;
form.innerHTML+=html;
});

// TIMER (50 minutes)
let time=3000;
let timer=setInterval(()=>{
let m=Math.floor(time/60),s=time%60;
document.getElementById("time").innerText=`${m}:${s<10?"0":""}${s}`;
time--;
if(time<0){clearInterval(timer);submitTest();}
},1000);

// MARKING
const totalMarks=250;
const perQ=totalMarks/questions.length;

// SUBMIT
function submitTest(){
let score=0,attempted=0,wrong=0,html="";
questions.forEach((q,i)=>{
let sel=document.querySelector(`input[name=q${i}]:checked`);
if(sel){
attempted++;
if(sel.value===q[5]){
score+=perQ;
html+=`<p class="correct">Q${i+1} ✔</p>`;
}else{
score-=1;
wrong++;
html+=`<p class="wrong">Q${i+1} ❌ (Ans: ${q[5]})</p>`;
}}});
let acc=attempted?((attempted-wrong)/attempted*100).toFixed(2):0;
document.getElementById("result").innerHTML=`
<h3>📊 Result</h3>
Total: ${totalMarks}<br>
Attempted: ${attempted}<br>
Correct: ${attempted-wrong}<br>
Wrong: ${wrong}<br>
Score: ${score.toFixed(2)}<br>
Accuracy: ${acc}%<hr>${html}`;
clearInterval(timer);
}
</script>

</body>
</html>
